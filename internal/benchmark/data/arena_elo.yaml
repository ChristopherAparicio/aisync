# Measures overall quality as perceived by humans across diverse tasks.
#
# NOTE: Raw ELO scores (typically 900-1400) are normalized to 0-100 scale
# using linear mapping: score = (elo - 900) / 5 (capped at 0-100).
# This makes them comparable with other 0-100% benchmarks.
#
# Source: https://chat.lmsys.org/?leaderboard (Coding category)
# Captured: 2026-03-27

