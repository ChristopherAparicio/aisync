syntax = "proto3";
package aisync.secrets;

option go_package = "github.com/ChristopherAparicio/aisync/internal/secrets/scanplugin/proto";

// SecretScanner is the gRPC service that external plugins implement.
service SecretScanner {
  rpc Scan(ScanRequest) returns (ScanResponse);
  rpc Mask(MaskRequest) returns (MaskResponse);
}

message ScanRequest {
  string content = 1;
}

message ScanResponse {
  repeated SecretMatch matches = 1;
}

message MaskRequest {
  string content = 1;
}

message MaskResponse {
  string masked_content = 1;
}

message SecretMatch {
  string type = 1;
  string value = 2;
  int32 start_pos = 3;
  int32 end_pos = 4;
}
