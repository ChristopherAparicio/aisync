# Model pricing catalog for aisync.
# Prices are in USD per 1 million tokens.
# This file is embedded at compile time (go:embed) and serves as the
# single source of truth for built-in model pricing.
#
# Tiers: some models charge more when cumulative input context exceeds a
# threshold. Each tier entry specifies a token threshold and a multiplier
# applied to the base input/output rates. Tiers are evaluated in order;
# tokens up to the first threshold use the base rate, then subsequent
# tiers apply their multiplier.
#
# Context windows: max_input_tokens and max_output_tokens define the model's
# context window and maximum output size. Used for context saturation
# forecasting and model fitness analysis.
#
# Last updated: 2026-03-27

models:
  # ─── Claude (Anthropic) ───────────────────────────────────────────
  - model: claude-opus-4
    input_per_mtoken: 15.0
    output_per_mtoken: 75.0
    cache_read_per_mtoken: 1.50
    cache_write_per_mtoken: 18.75
    max_input_tokens: 200000
    max_output_tokens: 32000
    tiers:
      - threshold_tokens: 200000
        input_multiplier: 2.0
        output_multiplier: 2.0

  - model: claude-sonnet-4
    input_per_mtoken: 3.0
    output_per_mtoken: 15.0
    cache_read_per_mtoken: 0.30
